name: Version and Tag Release

on:
  pull_request_target:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without 'v' (example: 1.0.2). Leave empty to auto-increment latest tag."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: version-and-tag-main
  cancel-in-progress: false

jobs:
  version_and_tag:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine next version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          RAW_VERSION="${INPUT_VERSION:-}"
          RAW_VERSION="${RAW_VERSION#v}"

          if [ -n "$RAW_VERSION" ]; then
            VERSION="$RAW_VERSION"
          else
            LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
            if [ -z "$LAST_TAG" ]; then
              VERSION="1.0.0"
            else
              LAST_VERSION="${LAST_TAG#v}"
              VERSION="$(python -c 'import re,sys; v=sys.argv[1];
if not re.fullmatch(r"\d+(?:\.\d+)*", v):
    raise SystemExit(f"Invalid latest tag format: {v}");
parts=[int(p) for p in v.split(".")]; parts[-1]+=1; print(".".join(map(str, parts)))' "$LAST_VERSION")"
            fi
          fi

          python -c 'import re,sys; v=sys.argv[1];
if not re.fullmatch(r"\d+(?:\.\d+)*", v):
    raise SystemExit(f"Invalid version format: {v}. Use numbers and dots only, like 1.0.2")' "$VERSION"

          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "Tag v$VERSION already exists."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Update version files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          perl -i -pe "s/^version\s*=\s*\"[^\"]+\"\s*$/version = \"$VERSION\"/" pyproject.toml
          perl -i -pe "s/^__version__\s*=\s*\"[^\"]+\"\s*$/__version__ = \"$VERSION\"/" sqla_lite/__init__.py

      - name: Commit and push version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml sqla_lite/__init__.py
          git commit -m "chore: bump version to $VERSION"
          git push origin main

      - name: Create and push tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
